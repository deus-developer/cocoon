name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  ROUTER_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/cocoon-router
  CLIENT_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/cocoon-client

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            slug: linux-amd64
          - platform: linux/arm64
            slug: linux-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3
        if: matrix.platform != 'linux/amd64'

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta-router
        with:
          images: ${{ env.ROUTER_IMAGE }}

      - uses: docker/build-push-action@v6
        id: build-router
        with:
          context: .
          file: ./docker/Dockerfile
          target: router
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta-router.outputs.labels }}
          cache-from: type=gha,scope=router-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=router-${{ matrix.slug }}
          outputs: type=image,name=${{ env.ROUTER_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - uses: docker/metadata-action@v5
        id: meta-client
        with:
          images: ${{ env.CLIENT_IMAGE }}

      - uses: docker/build-push-action@v6
        id: build-client
        with:
          context: .
          file: ./docker/Dockerfile
          target: client
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha,scope=client-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=client-${{ matrix.slug }}
          outputs: type=image,name=${{ env.CLIENT_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests/router /tmp/digests/client
          echo "${{ steps.build-router.outputs.digest }}" > "/tmp/digests/router/${{ matrix.slug }}"
          echo "${{ steps.build-client.outputs.digest }}" > "/tmp/digests/client/${{ matrix.slug }}"

      - if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.slug }}
          path: /tmp/digests
          retention-days: 1

  merge:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta-router
        with:
          images: ${{ env.ROUTER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/metadata-action@v5
        id: meta-client
        with:
          images: ${{ env.CLIENT_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Merge router manifests
        run: |
          DIGESTS=$(cat /tmp/digests/router/* | xargs -I{} echo "${{ env.ROUTER_IMAGE }}@{}")
          docker buildx imagetools create \
            $(echo '${{ steps.meta-router.outputs.tags }}' | xargs -I{} echo "--tag {}") \
            $DIGESTS

      - name: Merge client manifests
        run: |
          DIGESTS=$(cat /tmp/digests/client/* | xargs -I{} echo "${{ env.CLIENT_IMAGE }}@{}")
          docker buildx imagetools create \
            $(echo '${{ steps.meta-client.outputs.tags }}' | xargs -I{} echo "--tag {}") \
            $DIGESTS
